name: Deploy to VPS-001

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy siteguardian
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Tailscale verbinden via Headscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: "--login-server=https://vpn.athide.nl"
          version: latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo /opt/scripts/deploy.sh siteguardian app
          command_timeout: 10m
